<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Portfolio | Detective Mode</title>
    
    <!-- الخطوط -->
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-paper: #e6e1d6;
            --primary-ink: #333;
            --accent-red: #d9534f;
            --font-main: 'Cairo', sans-serif;
            --font-type: 'Special Elite', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: var(--font-main);
            background-color: var(--bg-paper);
            color: var(--primary-ink);
            /* نمط الورق المربّع المذكور في الصورة f82ba0072b9768f25474a1a3f7105517.jpg */
            background-image: 
                linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Navbar */
        nav {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(230, 225, 214, 0.95);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 50px; z-index: 1000; border-bottom: 1px solid #ccc;
        }

        .logo { font-family: var(--font-type); font-weight: bold; color: var(--accent-red); }
        .nav-links { display: flex; gap: 20px; list-style: none; }
        .nav-links a { text-decoration: none; color: #333; font-weight: bold; }

        /* Sections */
        section {
            min-height: 100vh; padding: 100px 50px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }

        /* Hero */
        .hero-title {
            font-size: 8vw; font-family: var(--font-type);
            text-align: center; line-height: 1; margin-bottom: 30px;
            opacity: 0; transform: translateY(30px);
        }

        /* Polaroid Simulation */
        .pola {
            width: 250px; background: white; padding: 15px 15px 40px 15px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
            border: 1px solid #ddd; position: absolute;
            opacity: 0; transform: scale(0.8) rotate(-5deg);
        }
        .pola .img-box { width: 100%; height: 200px; background: #eee; border: 1px solid #ccc; }
        .pola .caption { font-family: var(--font-type); text-align: center; margin-top: 10px; font-size: 0.9rem; }

        /* Buttons */
        .btn {
            padding: 12px 30px; border: 2px solid var(--primary-ink);
            background: transparent; cursor: pointer; font-family: var(--font-type);
            transition: 0.3s;
        }
        .btn:hover { background: var(--primary-ink); color: white; }

        /* Projects Grid */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px; width: 100%; max-width: 1200px; margin-top: 50px;
        }

        /* Modal */
        #modal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8); display:none; z-index: 2000;
            justify-content:center; align-items:center;
        }
        .modal-content {
            background: var(--bg-paper); padding: 50px; width: 80%; max-width: 700px;
            position: relative; border: 5px solid white;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .pola { position: relative; margin-bottom: 20px; opacity: 1; transform: none; top: auto !important; left: auto !important; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">DESIGN DETECTIVE</div>
        <ul class="nav-links">
            <li><a href="#hero">الرئيسية</a></li>
            <li><a href="#projects">المشاريع</a></li>
            <li><a href="#contact">اتصل بي</a></li>
        </ul>
    </nav>

    <section id="hero">
        <h1 class="hero-title" id="mainTitle">Design<br>Portfolio</h1>
        <p style="font-family: var(--font-type);">أهلاً بك في ملف التحقيقات البصري الخاص بي</p>
        
        <!-- بولارويد تحاكي صورة f82ba0072b9768f25474a1a3f7105517.jpg -->
        <div class="pola" style="top: 20%; left: 10%;">
            <div class="img-box"></div>
            <div class="caption">قضية رقم 01</div>
        </div>
        <div class="pola" style="bottom: 20%; right: 10%;">
            <div class="img-box"></div>
            <div class="caption">الخيط المفقود</div>
        </div>
    </section>

    <section id="projects">
        <h2 style="font-family: var(--font-type); color: var(--accent-red); font-size: 3rem;">المشاريع المحلولة</h2>
        <div class="grid">
            <div class="pola" style="position: relative; opacity: 1; transform: none;">
                <div class="img-box" style="background: #ccc;"></div>
                <div class="caption">مشروع ألفا</div>
                <button class="btn" style="width: 100%; margin-top: 10px;" onclick="openModal('ألفا', 'تفاصيل مشروع ألفا السري للغاية...')">التفاصيل</button>
            </div>
            <div class="pola" style="position: relative; opacity: 1; transform: none;">
                <div class="img-box" style="background: #bbb;"></div>
                <div class="caption">مشروع بيتا</div>
                <button class="btn" style="width: 100%; margin-top: 10px;" onclick="openModal('بيتا', 'هذا المشروع تم إنجازه في ظروف غامضة.')">التفاصيل</button>
            </div>
        </div>
    </section>

    <div id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="mTitle" style="font-family: var(--font-type);"></h2>
            <p id="mDesc" style="margin: 20px 0;"></p>
            <button class="btn" onclick="closeModal()">إغلاق الملف</button>
        </div>
    </div>

    <!-- GSAP لمجرد التأكد من التحريك -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <script>
        window.onload = () => {
            // تحريك العنوان
            gsap.to("#mainTitle", { opacity: 1, y: 0, duration: 1, ease: "power2.out" });
            
            // تحريك البولارويد
            gsap.to(".pola", { 
                opacity: 1, 
                scale: 1, 
                duration: 1, 
                stagger: 0.2, 
                delay: 0.5,
                ease: "back.out(1.7)" 
            });
        };

        function openModal(title, desc) {
            document.getElementById('mTitle').innerText = title;
            document.getElementById('mDesc').innerText = desc;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
